services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ahody-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ahody
      POSTGRES_USER: ahody
      POSTGRES_PASSWORD: ahody
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahody -d ahody"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
